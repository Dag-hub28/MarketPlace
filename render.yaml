services:
  - name: marketplace
    buildCommand: cd backend && pip install -r requirements.txt && cd ../frontend && npm install && npm run build
    startCommand: cd backend && gunicorn backend.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "marketplace.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: marketplace-db
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        value: "https://marketplace.onrender.com"
    databases:
      - name: marketplace-db
        databaseName: marketplace
        user: marketplace